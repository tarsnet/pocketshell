<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Claude Terminal — Login</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1b26;
      color: #c0caf5;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: #16161e;
      border: 1px solid #24283b;
      border-radius: 12px;
      padding: 32px 24px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
      color: #c0caf5;
    }

    .subtitle {
      text-align: center;
      color: #565f89;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #7aa2f7;
      margin-bottom: 6px;
    }

    input[type="password"], input[type="text"] {
      width: 100%;
      background: #24283b;
      color: #c0caf5;
      border: 1px solid #414868;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #7aa2f7;
    }

    input::placeholder {
      color: #565f89;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .btn-primary {
      background: #7aa2f7;
      color: #1a1b26;
    }

    .btn-primary:hover {
      background: #89b4fa;
    }

    .btn-primary:active {
      background: #3d59a1;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      background: #f7768e22;
      border: 1px solid #f7768e44;
      color: #f7768e;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }

    .success-msg {
      background: #9ece6a22;
      border: 1px solid #9ece6a44;
      color: #9ece6a;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .success-msg.visible {
      display: block;
    }

    /* QR code section (setup) */
    .qr-section {
      text-align: center;
      margin: 16px 0;
    }

    .qr-section img {
      width: 200px;
      height: 200px;
      border-radius: 8px;
      background: #fff;
      padding: 8px;
    }

    .qr-instructions {
      font-size: 13px;
      color: #565f89;
      margin-top: 8px;
      line-height: 1.5;
    }

    .secret-display {
      margin-top: 10px;
      padding: 8px 12px;
      background: #24283b;
      border-radius: 6px;
      font-family: "Cascadia Code", "Fira Code", monospace;
      font-size: 13px;
      color: #e0af68;
      word-break: break-all;
      user-select: all;
    }

    .secret-label {
      font-size: 11px;
      color: #565f89;
      margin-top: 8px;
      margin-bottom: 4px;
    }

    .divider {
      border: none;
      border-top: 1px solid #24283b;
      margin: 20px 0;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #7aa2f744;
      border-top-color: #7aa2f7;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-card {
      text-align: center;
      padding: 48px;
      color: #565f89;
    }

    #setup-view, #login-view { display: none; }
  </style>
</head>
<body>
  <div class="card" id="loading-card">
    <div class="loading-card">
      <div class="spinner"></div> Loading...
    </div>
  </div>

  <!-- SETUP VIEW -->
  <div class="card" id="setup-view">
    <h1>Setup</h1>
    <p class="subtitle">First-time setup for Claude Terminal</p>

    <div id="setup-error" class="error-msg"></div>

    <div class="form-group">
      <label for="setup-password">Create Password</label>
      <input type="password" id="setup-password" placeholder="Min 6 characters" autocomplete="new-password">
    </div>

    <div class="form-group">
      <label for="setup-password-confirm">Confirm Password</label>
      <input type="password" id="setup-password-confirm" placeholder="Re-enter password" autocomplete="new-password">
    </div>

    <hr class="divider">

    <div class="qr-section">
      <p style="font-size: 14px; font-weight: 600; margin-bottom: 12px;">Scan with Authenticator App</p>
      <img id="qr-image" src="" alt="QR Code">
      <p class="qr-instructions">
        Open Google Authenticator (or any TOTP app)<br>
        and scan this QR code.
      </p>
      <p class="secret-label">Or enter this key manually:</p>
      <div class="secret-display" id="secret-display"></div>
    </div>

    <hr class="divider">

    <div class="form-group">
      <label for="setup-totp">Enter Code from Authenticator</label>
      <input type="text" id="setup-totp" placeholder="6-digit code" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code">
    </div>

    <button class="btn btn-primary" id="setup-btn">Complete Setup</button>
  </div>

  <!-- LOGIN VIEW -->
  <div class="card" id="login-view">
    <h1>Claude Terminal</h1>
    <p class="subtitle">Enter your credentials to continue</p>

    <div id="login-error" class="error-msg"></div>

    <div class="form-group">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password">
    </div>

    <div class="form-group">
      <label for="login-totp">Authenticator Code</label>
      <input type="text" id="login-totp" placeholder="6-digit code" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code">
    </div>

    <button class="btn btn-primary" id="login-btn">Login</button>
  </div>

  <script>
    const loadingCard = document.getElementById('loading-card');
    const setupView = document.getElementById('setup-view');
    const loginView = document.getElementById('login-view');

    async function init() {
      try {
        const res = await fetch('/auth/status');
        const data = await res.json();
        loadingCard.style.display = 'none';

        if (data.isAuthenticated) {
          // Already logged in
          window.location.href = '/';
          return;
        }

        if (data.setupComplete) {
          showLogin();
        } else {
          await showSetup();
        }
      } catch (e) {
        loadingCard.innerHTML = '<div class="loading-card" style="color: #f7768e;">Failed to connect to server</div>';
      }
    }

    // --- SETUP ---
    async function showSetup() {
      setupView.style.display = 'block';
      try {
        const res = await fetch('/auth/setup-info');
        const data = await res.json();
        document.getElementById('qr-image').src = data.qrDataUrl;
        document.getElementById('secret-display').textContent = data.secret;
      } catch (e) {
        showError('setup-error', 'Failed to load setup info');
      }
    }

    document.getElementById('setup-btn').addEventListener('click', async () => {
      const password = document.getElementById('setup-password').value;
      const confirm = document.getElementById('setup-password-confirm').value;
      const totpCode = document.getElementById('setup-totp').value;

      if (password.length < 6) {
        return showError('setup-error', 'Password must be at least 6 characters');
      }
      if (password !== confirm) {
        return showError('setup-error', 'Passwords do not match');
      }
      if (!/^\d{6}$/.test(totpCode)) {
        return showError('setup-error', 'Enter a valid 6-digit code');
      }

      const btn = document.getElementById('setup-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Setting up...';

      try {
        const res = await fetch('/auth/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password, totpCode }),
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/';
        } else {
          showError('setup-error', data.error || 'Setup failed');
          btn.disabled = false;
          btn.textContent = 'Complete Setup';
        }
      } catch (e) {
        showError('setup-error', 'Connection error');
        btn.disabled = false;
        btn.textContent = 'Complete Setup';
      }
    });

    // --- LOGIN ---
    function showLogin() {
      loginView.style.display = 'block';
    }

    document.getElementById('login-btn').addEventListener('click', async () => {
      const password = document.getElementById('login-password').value;
      const totpCode = document.getElementById('login-totp').value;

      if (!password || !totpCode) {
        return showError('login-error', 'Both fields are required');
      }

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Logging in...';

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password, totpCode }),
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/';
        } else {
          showError('login-error', data.error || 'Login failed');
          btn.disabled = false;
          btn.textContent = 'Login';
        }
      } catch (e) {
        showError('login-error', 'Connection error');
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    });

    // Enter key on TOTP field submits
    document.getElementById('login-totp').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('login-btn').click();
    });
    document.getElementById('setup-totp').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('setup-btn').click();
    });

    // --- Helpers ---
    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 5000);
    }

    init();
  </script>
</body>
</html>
