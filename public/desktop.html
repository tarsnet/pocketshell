<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PocketShell</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <link rel="stylesheet" href="/desktop.css">
</head>
<body>
  <div id="terminal-container"></div>
  <!-- Auth banner (floating) -->
  <div id="auth-banner" class="auth-banner" hidden>
    <span id="auth-provider" class="auth-provider"></span>
    <span class="auth-text">Sign-in required —</span>
    <a id="auth-link" class="auth-open" href="#" target="_blank" rel="noopener">Open login page</a>
    <button id="auth-dismiss" class="auth-dismiss">&times;</button>
  </div>
  <div id="status-bar">
    <span id="status-indicator"></span>
    <span id="status-text">Connecting...</span>
    <span id="status-project"></span>
    <span id="status-right">Ctrl+Shift+R to restart</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.18.0/lib/addon-webgl.min.js"></script>
  <script src="/shared.js"></script>
  <script src="/desktop.js"></script>
  <script>
    (function () {
      var modes = { claude: 'Claude Code', copilot: 'GitHub Copilot', terminal: 'Terminal' };
      var mode = window.POCKETSHELL_MODE || 'terminal';
      document.title = (modes[mode] || 'Terminal') + ' — PocketShell';
    })();
  </script>
</body>
</html>
